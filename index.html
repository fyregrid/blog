<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>grcodev/blog</title>

  <!-- Detecta BASE antes de qualquer asset -->
  <script>
    var __BASE = (
      location.hostname === '127.0.0.1' ||
      location.hostname === 'localhost' ||
      location.hostname.endsWith('.pages.dev')
    ) ? '' : '/blog';

    // Injeta CSS dinamicamente com path correto
    ['css/styles.css', 'css/queries.css'].forEach(function (href) {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = __BASE + '/' + href;
      document.head.appendChild(link);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <nav id="nav">
    <img src="https://github.com/grcodev/grcodev/releases/download/vault/cube_icon.png"
      style="width: 32px; height: 32px; border-radius: 25%;">
    <a href="#" data-link>Home</a>
  </nav>

  <main id="app"></main>

  <footer id="site-footer"></footer>

  <!-- Scripts injetados com BASE correto -->
  <script>
    (function () {
      var scripts = [
        'js/utils.js',
        'js/router.js',
        'js/pages/404.js',
        'js/pages/legal.js',
        'js/pages/home.js',
        'js/app.js'
      ];

      function loadNext(i) {
        if (i >= scripts.length) return;
        var s = document.createElement('script');
        s.src = __BASE + '/' + scripts[i];
        s.onload = function () { loadNext(i + 1); };
        s.onerror = function () { console.error('Falha ao carregar:', s.src); loadNext(i + 1); };
        document.body.appendChild(s);
      }

      loadNext(0);
    })();
  </script>

</body>

</html>
